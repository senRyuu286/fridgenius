name: fridgenius
description: "Fridgenius! is a Gemini-powered mobile app that transforms whatever ingredients you already have in your kitchen into ranked recipe suggestions, shareable community posts, and a daily cooking habit."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  camera: ^0.12.0+2
  cloud_firestore: ^6.7.0
  firebase_ai: ^3.14.1
  firebase_app_check: ^0.4.5+2
  firebase_auth: ^6.5.6
  firebase_core: ^4.12.1
  flutter:
    sdk: flutter
  flutter_hooks: ^0.21.3+1
  flutter_svg: ^2.0.10+1
  freezed: ^3.2.6-dev.1
  freezed_annotation: ^3.1.0
  go_router: ^17.3.0
  google_fonts: ^8.1.0
  google_mlkit_image_labeling: ^0.15.0
  hooks_riverpod: ^3.3.2
  json_annotation: ^4.12.0
  riverpod_annotation: ^4.0.3
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  riverpod_generator: ^4.0.4
  json_serializable: ^6.14.0
  flutter_launcher_icons: ^0.14.4

# App launcher icon, generated from the Fridgenius mark.
# Regenerate with: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  # Single source: the padded foreground (fridge + sparkles). The brand-green
  # backdrop is supplied per-platform below, so no separate full-icon asset.
  image_path: "assets/launcher/icon_foreground.png"
  # iOS icons can't have transparency; fill behind the mark with brand green.
  remove_alpha_ios: true
  background_color_ios: "#33C15A"
  # Android adaptive icon: brand-green plate + padded foreground.
  adaptive_icon_background: "#33C15A"
  adaptive_icon_foreground: "assets/launcher/icon_foreground.png"

flutter:
  uses-material-design: true

  assets:
    - assets/
