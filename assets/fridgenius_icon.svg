<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" font-family="Archivo Black, Arial Black, sans-serif">
  <defs>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="2.4" fill="#F7F1DE" fill-opacity="0.30"/>
    </pattern>
    <clipPath id="bgClip"><rect x="20" y="20" width="472" height="472" rx="112"/></clipPath>
  </defs>

  <!-- background tile -->
  <rect x="20" y="20" width="472" height="472" rx="112" fill="#33C15A" stroke="#141414" stroke-width="18"/>
  <g clip-path="url(#bgClip)"><rect x="20" y="20" width="472" height="472" fill="url(#dots)"/></g>

  <!-- fridge -->
  <g>
    <rect x="171" y="132" width="184" height="286" rx="34" fill="#141414"/>
    <rect x="156" y="117" width="184" height="286" rx="34" fill="#F15E6E" stroke="#141414" stroke-width="14"/>
    <!-- freezer divider -->
    <line x1="163" y1="205" x2="333" y2="205" stroke="#141414" stroke-width="10"/>
    <!-- handles -->
    <rect x="176" y="150" width="16" height="34" rx="8" fill="#F5B81E" stroke="#141414" stroke-width="6"/>
    <rect x="176" y="228" width="16" height="70" rx="8" fill="#F5B81E" stroke="#141414" stroke-width="6"/>
    <!-- cute face on lower door -->
    <circle cx="243" cy="288" r="11" fill="#141414"/>
    <circle cx="303" cy="288" r="11" fill="#141414"/>
    <circle cx="247" cy="284" r="3.5" fill="#FFFFFF"/>
    <circle cx="307" cy="284" r="3.5" fill="#FFFFFF"/>
    <path d="M240 322 Q273 352 306 322" fill="none" stroke="#141414" stroke-width="10" stroke-linecap="round"/>
    <!-- rosy cheeks -->
    <circle cx="222" cy="312" r="9" fill="#FFFFFF" fill-opacity="0.45"/>
    <circle cx="324" cy="312" r="9" fill="#FFFFFF" fill-opacity="0.45"/>
  </g>

  <!-- AI genius sparkles -->
  <polygon points="360.0,90.0 374.1,135.9 420.0,150.0 374.1,164.1 360.0,210.0 345.9,164.1 300.0,150.0 345.9,135.9" fill="#F5B81E" stroke="#141414" stroke-width="10" stroke-linejoin="round"/>
  <polygon points="392.0,212.0 398.4,231.6 418.0,238.0 398.4,244.4 392.0,264.0 385.6,244.4 366.0,238.0 385.6,231.6" fill="#F7F1DE" stroke="#141414" stroke-width="7" stroke-linejoin="round"/>
  <polygon points="150.0,128.0 155.7,144.3 172.0,150.0 155.7,155.7 150.0,172.0 144.3,155.7 128.0,150.0 144.3,144.3" fill="#F7F1DE" stroke="#141414" stroke-width="6" stroke-linejoin="round"/>
</svg>